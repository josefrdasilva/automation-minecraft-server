version: '3'
services:
  mc:
    image: itzg/minecraft-server
    container_name: mc-server
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      MEMORY: "6G"
      VERSION: "LATEST"
      CREATE_CONSOLE_IN_PIPE: "true"
    volumes:
      - ./data:/data
    restart: unless-stopped
    stdin_open: true
    tty: true
